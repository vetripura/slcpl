<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIBIN Learning Cart | VE Team Directory - Tripura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Google Fonts: Poppins for clean modern look, Inter as fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f9ff 0%, #e9f0fa 100%);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            color: #1a2c3e;
        }

        /* main container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header section with brand & badge */
        .brand-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .company-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(6px);
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            margin-bottom: 1.2rem;
            border: 1px solid rgba(46, 125, 188, 0.2);
        }

        .company-badge i {
            font-size: 1.6rem;
            color: #1e6f9f;
            margin-right: 10px;
        }

        .company-badge span {
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            color: #1e4a6b;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1F4E6E, #2c7cb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .location-tag {
            background: linear-gradient(120deg, #2c7cb6, #5fa7cf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: inherit;
        }

        .subhead {
            font-size: 1.1rem;
            color: #4a627a;
            font-weight: 500;
            border-bottom: 2px solid rgba(44, 124, 182, 0.3);
            display: inline-block;
            padding-bottom: 6px;
            margin-top: 6px;
        }

        .team-intro {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .stat-chip {
            background: white;
            border-radius: 40px;
            padding: 0.5rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #1e6f9f;
            border: 1px solid #cde3f0;
        }

        .stat-chip i {
            font-size: 1rem;
        }

        /* grid layout for cards */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
        }

        /* modern card design */
        .team-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            border: 1px solid rgba(144, 188, 216, 0.4);
            position: relative;
        }

        .team-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -16px rgba(23, 78, 110, 0.2);
            border-color: #9dc6e2;
        }

        /* subtle gradient accent */
        .card-accent {
            height: 6px;
            background: linear-gradient(90deg, #2c7cb6, #64b5f6, #2c7cb6);
            width: 100%;
        }

        .card-content {
            padding: 1.6rem 1.5rem 1.8rem 1.5rem;
        }

        .member-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.45rem;
            font-weight: 700;
            color: #1b3b4f;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .member-name i {
            font-size: 1.5rem;
            color: #2c7cb6;
            background: #eef4fc;
            padding: 8px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .email-container {
            display: flex;
            align-items: center;
            background: #f2f7fd;
            padding: 0.75rem 1rem;
            border-radius: 24px;
            margin-top: 1rem;
            transition: background 0.2s;
            border: 1px solid #e2edf6;
            gap: 10px;
        }

        .email-container i {
            color: #2c7cb6;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .email-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f6390;
            text-decoration: none;
            word-break: break-all;
            transition: color 0.2s;
            font-family: 'Courier New', monospace;
            letter-spacing: -0.2px;
            flex: 1;
        }

        .email-link:hover {
            color: #0e4b70;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* copy button */
        .copy-btn {
            margin-left: auto;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            color: #6f9fbf;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 40px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .copy-btn i {
            margin: 0;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            background: #e3f0f9;
            color: #1f6e9e;
            transform: scale(1.02);
        }

        /* tooltip / toast notification */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            background: rgba(28, 55, 74, 0.95);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            font-family: 'Inter', monospace;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* footer design */
        .footer-note {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #6c86a0;
            border-top: 1px solid rgba(100, 150, 180, 0.2);
            padding-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .footer-note i {
            margin: 0 4px;
        }

        @media (max-width: 680px) {
            body {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 2rem;
                flex-direction: column;
                gap: 6px;
            }
            .team-grid {
                gap: 1.2rem;
                grid-template-columns: 1fr;
            }
            .member-name {
                font-size: 1.25rem;
            }
            .email-link {
                font-size: 0.72rem;
            }
            .toast-msg {
                white-space: normal;
                max-width: 90vw;
                text-align: center;
                font-size: 0.8rem;
            }
            .copy-btn span {
                display: none;
            }
            .copy-btn i {
                margin: 0;
            }
            .copy-btn {
                padding: 6px 8px;
            }
        }

        /* animated decorative blob */
        .bg-blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(44,124,182,0.03) 0%, rgba(100,180,220,0.02) 100%);
            border-radius: 50%;
            z-index: -1;
            bottom: -20vh;
            right: -15vw;
            pointer-events: none;
        }
        .bg-blob-2 {
            top: -10vh;
            left: -10vw;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(100,180,210,0.04) 0%, rgba(44,124,182,0.01) 100%);
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* Member badge role indicator */
        .member-role-badge {
            display: inline-block;
            background: #eef2f8;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            color: #2c7cb6;
            font-weight: 500;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="bg-blob"></div>
<div class="bg-blob-2"></div>

<div class="container">
    <div class="brand-header">
        <div class="company-badge">
            <i class="fas fa-chalkboard-user"></i>
            <span>SIBIN LEARNING CART PRIVATE LIMITED</span>
        </div>
        <h1>
            VE Team 
            <span class="location-tag">· Tripura</span>
        </h1>
        <div class="subhead">        <div class="team-intro">
            <div class="stat-chip"><i class="fas fa-users"></i> <span id="memberCount">9</span> </div>
            <div class="stat-chip"><i class="fas fa-envelope"></i> Quick Connect</div>
            <div class="stat-chip"><i class="fas fa-map-marker-alt"></i> Tripura, India</div>
        </div>
    </div>

    <div class="team-grid" id="teamGrid"></div>

    <div class="footer-note">
        <span><i class="fas fa-regular fa-copy"></i> Click copy icon to copy email</span>
        <span><i class="fas fa-solid fa-bolt"></i> SIBIN Learning Cart — 2026</span>
        <span><i class="fas fa-heart" style="color: #2c7cb6;"></i> </span>
    </div>
</div>

<div id="toastMsg" class="toast-msg"><i class="fas fa-check-circle" style="margin-right: 8px;"></i> Email copied to clipboard</div>

<script>
    // Team data from provided list
    const teamMembers = [
        { name: "Nirmalya Bhattacharjee", email: "nirmalya.bhattacharjee@sibinlearningcart.com", role: "Team Lead" },
        { name: "Animesh Barua", email: "animesh.barua@sibinlearningcart.com", role: "" },
        { name: "Pritam Chakraborty", email: "pritam.chakraborty@sibinlearningcart.com", role: "" },
        { name: "Arpita Saha", email: "arpita.saha@sibinlearningcart.com", role: "" },
        { name: "Subhrajit Majumder", email: "subhrajit.majumder@sibinlearningcart.com", role: "" },
        { name: "Srabanti Datta", email: "srabanti.datta@sibinlearningcart.com", role: "" },
        { name: "Bishal Debnath", email: "bishal.debnath@sibinlearningcart.com", role: "" },
        { name: "Deepjit Sutradhar", email: "deepjit.sutradhar@sibinlearningcart.com", role: "" }
    ];

    // render team cards with enhanced design
    const teamGrid = document.getElementById('teamGrid');
    
    function getMemberIcon(name) {
        if (name.includes('Nirmalya')) return '<i class="fas fa-crown"></i>';
        if (name.includes('Animesh')) return '<i class="fas fa-brain"></i>';
        if (name.includes('Pritam')) return '<i class="fas fa-code"></i>';
        if (name.includes('Arpita')) return '<i class="fas fa-palette"></i>';
        if (name.includes('Subhrajit')) return '<i class="fas fa-chart-line"></i>';
        if (name.includes('Srabanti')) return '<i class="fas fa-feather-alt"></i>';
        if (name.includes('Bishal')) return '<i class="fas fa-database"></i>';
        if (name.includes('Deepjit')) return '<i class="fas fa-cloud-sun"></i>';
        return '<i class="fas fa-user-astronaut"></i>';
    }
    
    function buildCards() {
        teamGrid.innerHTML = '';
        teamMembers.forEach((member) => {
            const card = document.createElement('div');
            card.className = 'team-card';
            
            const accentBar = document.createElement('div');
            accentBar.className = 'card-accent';
            
            const cardContent = document.createElement('div');
            cardContent.className = 'card-content';
            
            // Name section with icon and role badge
            const nameDiv = document.createElement('div');
            nameDiv.className = 'member-name';
            const iconHtml = getMemberIcon(member.name);
            
            const nameSpan = document.createElement('span');
            nameSpan.innerHTML = `${iconHtml} <span style="margin-left: 0;">${member.name}</span>`;
            nameDiv.appendChild(nameSpan);
            
            // Add role badge
            const roleBadge = document.createElement('span');
            roleBadge.className = 'member-role-badge';
            roleBadge.textContent = member.role;
            nameDiv.appendChild(roleBadge);
            
            // Email container
            const emailContainer = document.createElement('div');
            emailContainer.className = 'email-container';
            
            const envelopeIcon = document.createElement('i');
            envelopeIcon.className = 'fas fa-envelope';
            
            const emailLink = document.createElement('a');
            emailLink.href = `mailto:${member.email}`;
            emailLink.className = 'email-link';
            emailLink.textContent = member.email;
            emailLink.title = `Send email to ${member.name}`;
            
            const copyButton = document.createElement('button');
            copyButton.className = 'copy-btn';
            copyButton.setAttribute('aria-label', 'Copy email address');
            copyButton.innerHTML = '<i class="far fa-copy"></i> <span>Copy</span>';
            
            // Copy functionality with improved feedback
            copyButton.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                navigator.clipboard.writeText(member.email).then(() => {
                    showToast(`${member.name.split(' ')[0]}'s email copied!`, false);
                    const originalHTML = copyButton.innerHTML;
                    copyButton.innerHTML = '<i class="fas fa-check"></i> <span>Copied!</span>';
                    setTimeout(() => {
                        copyButton.innerHTML = originalHTML;
                    }, 1500);
                }).catch(() => {
                    showToast('⚠️ Press Ctrl+C to copy', true);
                });
            });
            
            emailContainer.appendChild(envelopeIcon);
            emailContainer.appendChild(emailLink);
            emailContainer.appendChild(copyButton);
            
            cardContent.appendChild(nameDiv);
            cardContent.appendChild(emailContainer);
            
            // subtle note with quick action hint
            const subtleNote = document.createElement('div');
            subtleNote.style.marginTop = '14px';
            subtleNote.style.fontSize = '0.7rem';
            subtleNote.style.color = '#7f99b3';
            subtleNote.style.display = 'flex';
            subtleNote.style.alignItems = 'center';
            subtleNote.style.gap = '8px';
            subtleNote.style.justifyContent = 'flex-start';
            subtleNote.innerHTML = '<i class="fas fa-regular fa-message"></i> VE core team · reach out anytime';
            cardContent.appendChild(subtleNote);
            
            card.appendChild(accentBar);
            card.appendChild(cardContent);
            teamGrid.appendChild(card);
        });
    }
    
    // Toast notification manager
    let toastTimeout = null;
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        
        if (isError) {
            toast.innerHTML = `<i class="fas fa-exclamation-triangle" style="margin-right: 8px;"></i> ${message}`;
            toast.style.background = "rgba(180, 70, 50, 0.95)";
        } else {
            toast.innerHTML = `<i class="fas fa-check-circle" style="margin-right: 8px;"></i> ${message}`;
            toast.style.background = "rgba(28, 55, 74, 0.95)";
        }
        
        toast.classList.add('show');
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 8px;"></i> Email copied to clipboard';
                toast.style.background = "rgba(28, 55, 74, 0.95)";
            }, 200);
        }, 2000);
    }
    
    // Additional effects and accessibility
    function initEffects() {
        console.log('✨ SIBIN VE Team Tripura — interactive directory ready');
        
        // Add keyboard shortcuts hint
        const style = document.createElement('style');
        style.textContent = `
            .copy-btn:focus-visible {
                outline: 2px solid #2c7cb6;
                background: #e3f0f9;
                border-radius: 30px;
            }
            .email-link:focus-visible {
                outline: 2px solid #2c7cb6;
                border-radius: 20px;
            }
            .team-card {
                transition: transform 0.25s ease, box-shadow 0.3s;
            }
            .member-role-badge {
                transition: all 0.2s;
            }
            .team-card:hover .member-role-badge {
                background: #2c7cb6;
                color: white;
            }
        `;
        document.head.appendChild(style);
        
        // Add member count animation
        const memberCountSpan = document.getElementById('memberCount');
        if (memberCountSpan) {
            memberCountSpan.textContent = teamMembers.length;
        }
    }
    
    // Initialize everything
    buildCards();
    initEffects();
    
    // Dynamic year in footer (preserve existing text)
    const currentYear = new Date().getFullYear();
    const footerSpans = document.querySelectorAll('.footer-note span');
    if (footerSpans.length > 0) {
        const firstSpan = footerSpans[0];
        const originalText = firstSpan.innerHTML;
        if (!firstSpan.innerHTML.includes('©')) {
            firstSpan.innerHTML = `<i class="fas fa-regular fa-copyright"></i> ${currentYear} · ${originalText}`;
        }
    }
    
    // Optional: Add ripple effect on card click for fun? subtle
    const cards = document.querySelectorAll('.team-card');
    cards.forEach(card => {
        card.addEventListener('click', (e) => {
            if (e.target.closest('.copy-btn') || e.target.closest('.email-link')) return;
            // just a micro interaction - no action needed
        });
    });
</script>
</body>
</html>

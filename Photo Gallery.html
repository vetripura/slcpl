<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Slide Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.gallery-wrapper{
    width:90%;
    max-width:1200px;
}

.gallery-title{
    text-align:center;
    color:#fff;
    font-size:2.5rem;
    margin-bottom:30px;
}

.slider{
    position:relative;
    height:550px;
    perspective:1200px;
    overflow:hidden;
}

.slide{
    position:absolute;
    top:50%;
    left:50%;
    width:640px;       /* 4:3 Ratio */
    aspect-ratio:4/3;
    transform-style:preserve-3d;
    transition:all .6s ease;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.caption{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:20px;
    color:white;
    background:linear-gradient(
        transparent,
        rgba(0,0,0,.85)
    );
    font-size:1.2rem;
    font-weight:600;
}

/* Navigation Buttons */

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    color:white;
    font-size:24px;
    cursor:pointer;
    z-index:100;
    transition:.3s;
}

.nav-btn:hover{
    background:rgba(255,255,255,.3);
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

@media(max-width:768px){

    .slider{
        height:380px;
    }

    .slide{
        width:90%;
    }

    .gallery-title{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<div class="gallery-wrapper">

    <h1 class="gallery-title">Photo Gallery</h1>

    <div class="slider">

        <button class="nav-btn prev">&#10094;</button>
        <button class="nav-btn next">&#10095;</button>

        <div class="slide">
            <img src="images/photo1.jpg">
            <div class="caption">Student Examination</div>
        </div>

        <div class="slide">
            <img src="images/photo2.jpg">
            <div class="caption">Industry Visit Session (Retail Sector)</div>
        </div>

        <div class="slide">
            <img src="images/photo3.jpg">
            <div class="caption">Teachers' Training</div>
        </div>

        <div class="slide">
            <img src="images/photo4.jpg">
            <div class="caption">Automotive Sector Lab</div>
        </div>

        <div class="slide">
            <img src="images/photo5.jpg">
            <div class="caption">Agriculture Sector Tools</div>
        </div>

    </div>

</div>

<script>

const slides = document.querySelectorAll('.slide');
const next = document.querySelector('.next');
const prev = document.querySelector('.prev');

let current = 0;

function updateSlides(){

    slides.forEach((slide,index)=>{

        const offset = index - current;

        if(offset === 0){
            slide.style.transform =
            'translate(-50%, -50%) scale(1)';
            slide.style.zIndex = 10;
            slide.style.opacity = 1;
        }

        else if(offset === -1 || offset === slides.length-1){
            slide.style.transform =
            'translate(calc(-50% - 280px), -50%) rotateY(35deg) scale(.8)';
            slide.style.zIndex = 5;
            slide.style.opacity = .6;
        }

        else if(offset === 1 || offset === -(slides.length-1)){
            slide.style.transform =
            'translate(calc(-50% + 280px), -50%) rotateY(-35deg) scale(.8)';
            slide.style.zIndex = 5;
            slide.style.opacity = .6;
        }

        else{
            slide.style.transform =
            'translate(-50%, -50%) scale(.5)';
            slide.style.opacity = 0;
            slide.style.zIndex = 0;
        }
    });
}

next.addEventListener('click',()=>{
    current = (current + 1) % slides.length;
    updateSlides();
});

prev.addEventListener('click',()=>{
    current = (current - 1 + slides.length) % slides.length;
    updateSlides();
});

slides.forEach((slide,index)=>{
    slide.addEventListener('click',()=>{
        current = index;
        updateSlides();
    });
});

updateSlides();

</script>

</body>
</html>
